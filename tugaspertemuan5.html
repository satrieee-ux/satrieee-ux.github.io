        .top-btn {

        }
        .top-btn:hover {
            background: #ffffff;
            transform: scale(1.1);
        }

        .btn-left {
            position: absolute; top: 25px; left: 25px;
        }
        .btn-right {
            position: absolute; top: 25px; right: 25px;
        }

        .profile-pic {
            width: 96px; 
            height: 96px;
            object-fit: cover;
        }

        .custom-link-btn {
            border-radius: 12px;
            min-height: 65px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .custom-link-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
        }

        .link-icon-img {
            width: 45px;
            height: 45px;
            object-fit: cover;
            border-radius: 8px;
        }

        .footer-icon-link {
            font-size: 28px;
            transition: transform 0.2s;
        }
        .footer-icon-link:hover {
            transform: scale(1.1);
            color: #333333;
